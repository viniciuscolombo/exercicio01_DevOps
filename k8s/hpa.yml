apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: app-satc-hpa
  namespace: ##K8S_NAMESPACE##
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: app-satc
  minReplicas: 1
  maxReplicas: 5
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300 # 5 minutos
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30 # 30 segundos
      policies:
        - type: Pods
          value: 1
          periodSeconds: 15
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70